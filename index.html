<!DOCTYPE html>
<html>
<head>
    <title>La Belgique du Fast-Food</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .leaflet-popup-content-wrapper { border-radius: 8px; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([50.85, 4.35], 8);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        // --- 1. DÉFINITION DE L'ICÔNE OFFICIELLE ---
        var mcdoIcon = L.icon({
            iconUrl: 'MCDO_LOGO.png', // Nom exact du fichier sur ton GitHub
            iconSize: [30, 30],       // Taille du logo (tu peux augmenter à 40 si c'est trop petit)
            iconAnchor: [15, 15],     // Milieu du logo (15 est la moitié de 30)
            popupAnchor: [0, -15]     // La bulle s'ouvrira juste au-dessus du logo
        });

        fetch('mcdonalds.json')
            .then(res => res.json())
            .then(data => {
                data.forEach(restau => {
                    if (restau.lat_times_a_million && restau.lng_times_a_million) {
                        var lat = restau.lat_times_a_million / 1000000;
                        var lng = restau.lng_times_a_million / 1000000;

                        // --- 2. UTILISATION DU MARQUEUR AVEC ICÔNE ---
                        var marker = L.marker([lat, lng], { icon: mcdoIcon }).addTo(map);

                        marker.bindPopup("<b>McDo " + (restau.city_fr || restau.city_nl) + "</b><br>" + restau.street_fr + " " + restau.nr);
                    }
                });
            });
    </script>
</body>
</html>
