<!DOCTYPE html>
<html>
<head>
    <title>La Belgique du Fast-Food</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .popup-title { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
        /* Style optionnel pour s'assurer que le SVG ne déborde pas du marqueur */
        .leaflet-marker-icon { background: none !important; border: none !important; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Initialisation de la carte sur la Belgique
        var map = L.map('map').setView([50.85, 4.35], 8);

        // Fond de carte épuré pour faire ressortir les logos
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CartoDB'
        }).addTo(map);

        // 2. Définition des icônes

        // McDo : Circulaire
        var mcdoIcon = L.icon({
            iconUrl: 'MCDO_LOGO.png',
            iconSize: [30, 30],
            iconAnchor: [15, 15],
            popupAnchor: [0, -15]
        });

        // Quick : Rectangulaire (Ratio 3:2 analysé depuis le SVG)
        var quickIcon = L.icon({
            iconUrl: 'quick.svg', // Utilisation du fichier SVG
            iconSize: [36, 24],   // Ratio 3:2 (36/24 = 1.5)
            iconAnchor: [18, 12], // Centrage exact (36/2 et 24/2)
            popupAnchor: [0, -12]
        });

        // 3. Chargement de McDonald's
        fetch('mcdonalds.json')
            .then(res => res.json())
            .then(data => {
                data.forEach(m => {
                    if (m.lat_times_a_million) {
                        var lat = m.lat_times_a_million / 1000000;
                        var lng = m.lng_times_a_million / 1000000;
                        L.marker([lat, lng], { icon: mcdoIcon }).addTo(map)
                         .bindPopup("<div class='popup-title'>McDo " + (m.city_fr || m.city_nl) + "</div>" + m.street_fr + " " + m.nr);
                    }
                });
            })
            .catch(err => console.error("Erreur McDo:", err));

        // 4. Chargement de Quick
        fetch('quick.json') // Nom du fichier corrigé
            .then(res => res.json())
            .then(data => {
                // On accède à la structure du fichier JSON Schema.org
                const restaurants = data[0].itemListElement;
                restaurants.forEach(entry => {
                    const info = entry.item;
                    if (info.geo) {
                        L.marker([info.geo.latitude, info.geo.longitude], { icon: quickIcon }).addTo(map)
                         .bindPopup("<div class='popup-title' style='color:#da291c'>Quick " + info.name + "</div>" + info.address.streetAddress);
                    }
                });
                console.log(restaurants.length + " Quick chargés !");
            })
            .catch(err => console.error("Erreur Quick:", err));
    </script>
</body>
</html>
