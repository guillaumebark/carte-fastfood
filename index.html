<!DOCTYPE html>
<html>
<head>
    <title>La Belgique du Fast-Food</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .popup-title { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map').setView([50.85, 4.35], 8);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CartoDB'
        }).addTo(map);

        // MCDO : Carré
        var mcdoIcon = L.icon({
            iconUrl: 'MCDO_LOGO.png',
            iconSize: [30, 30],
            iconAnchor: [15, 15],
            popupAnchor: [0, -15]
        });

        // QUICK : Rectangle allongé (Largeur 45, Hauteur 25)
        var quickIcon = L.icon({
            iconUrl: 'Quick.png',
            iconSize: [45, 25], 
            iconAnchor: [22, 12],
            popupAnchor: [0, -12]
        });

        // MCDO
        fetch('mcdonalds.json')
            .then(res => res.json())
            .then(data => {
                data.forEach(m => {
                    if (m.lat_times_a_million) {
                        var lat = m.lat_times_a_million / 1000000;
                        var lng = m.lng_times_a_million / 1000000;
                        L.marker([lat, lng], { icon: mcdoIcon }).addTo(map)
                         .bindPopup("<div class='popup-title'>McDo " + (m.city_fr || m.city_nl) + "</div>" + m.street_fr + " " + m.nr);
                    }
                });
            });

        // QUICK
        fetch('quick_clean.json')
            .then(res => res.json())
            .then(data => {
                const restaurants = data[0].itemListElement;
                restaurants.forEach(entry => {
                    const info = entry.item;
                    if (info.geo) {
                        L.marker([info.geo.latitude, info.geo.longitude], { icon: quickIcon }).addTo(map)
                         .bindPopup("<div class='popup-title' style='color:#da291c'>Quick " + info.name + "</div>" + info.address.streetAddress);
                    }
                });
            });
    </script>
</body>
</html>
